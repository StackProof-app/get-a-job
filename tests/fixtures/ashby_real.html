<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Acme Engineering: Apply (Ashby shape)</title>
</head>
<body>
  <main>
    <h1>Software Engineer application</h1>
    <form id="ashby-application-form" class="ashby-application-form-outer">
      <section>
        <h2>About you</h2>

        <div>
          <label for="_systemfield_name">Full name</label>
          <input id="_systemfield_name" name="name" type="text" required>
        </div>

        <div>
          <label for="_systemfield_email">Email</label>
          <input id="_systemfield_email" name="email" type="email" required>
        </div>

        <div>
          <label for="_systemfield_phone">Phone</label>
          <input id="_systemfield_phone" name="phone" type="tel">
        </div>

        <div>
          <label for="_systemfield_linkedin">LinkedIn URL</label>
          <input id="_systemfield_linkedin" name="linkedin" type="url">
        </div>
      </section>

      <section>
        <h2>Your application</h2>

        <div>
          <label for="_systemfield_resume">Resume</label>
          <input id="_systemfield_resume" name="resume" type="file" accept="application/pdf">
        </div>

        <div>
          <label for="_customfield_4f8e92aa-1234-5678-90ab-cdef12345678">Why do you want to work here?</label>
          <textarea id="_customfield_4f8e92aa-1234-5678-90ab-cdef12345678" name="custom_0" rows="6"></textarea>
        </div>
      </section>

      <button type="submit">Submit application</button>
    </form>
  </main>
</body>
</html>
