<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Acme Engineering: Apply (Greenhouse shape)</title>
</head>
<body>
  <main>
    <h1>Software Engineer application</h1>
    <form id="application_form" action="#" method="post" autocomplete="off" enctype="multipart/form-data">
      <section>
        <h2>About you</h2>

        <div>
          <label for="first_name">First name</label>
          <input id="first_name" name="job_application[first_name]" type="text" required>
        </div>

        <div>
          <label for="last_name">Last name</label>
          <input id="last_name" name="job_application[last_name]" type="text" required>
        </div>

        <div>
          <label for="email">Email</label>
          <input id="email" name="job_application[email]" type="email" required>
        </div>

        <div>
          <label for="phone">Phone</label>
          <input id="phone" name="job_application[phone]" type="tel" placeholder="555-123-4567">
        </div>

        <div>
          <label for="linkedin">LinkedIn URL</label>
          <input id="linkedin" name="job_application[urls][LinkedIn]" type="url">
        </div>
      </section>

      <section>
        <h2>Your application</h2>

        <div>
          <label for="resume">Resume (PDF)</label>
          <input id="resume" name="job_application[resume]" type="file" accept="application/pdf">
        </div>

        <div>
          <label for="custom_q1">Why do you want to work at Acme?</label>
          <textarea id="custom_q1" name="job_application[answers_attributes][0][text_value]" rows="6"></textarea>
        </div>
      </section>

      <button type="submit">Submit application</button>
    </form>
  </main>
</body>
</html>
