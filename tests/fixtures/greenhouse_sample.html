<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Acme Engineering: Apply</title>
</head>
<body>
  <main>
    <h1>Software Engineer application</h1>
    <form id="application_form" autocomplete="off">
      <section>
        <h2>About you</h2>

        <div>
          <label for="first_name">First name</label>
          <input id="first_name" name="first_name" type="text" required>
        </div>

        <div>
          <label for="last_name">Last name</label>
          <input id="last_name" name="last_name" type="text" required>
        </div>

        <div>
          <label for="email">Email</label>
          <input id="email" name="email" type="email" required>
        </div>

        <div>
          <label for="phone">Phone</label>
          <input id="phone" name="phone" type="tel" required placeholder="555-123-4567">
        </div>

        <div>
          <label for="linkedin_url">LinkedIn URL</label>
          <input id="linkedin_url" name="linkedin_url" type="url">
        </div>
      </section>

      <section>
        <h2>Your application</h2>

        <div>
          <label for="cover_letter">Cover letter</label>
          <textarea id="cover_letter" name="cover_letter" rows="6"></textarea>
        </div>

        <div>
          <label for="resume">Resume (PDF)</label>
          <input id="resume" name="resume" type="file" accept="application/pdf">
        </div>
      </section>

      <button type="submit">Submit application</button>
    </form>
  </main>
</body>
</html>
